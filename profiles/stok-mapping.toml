name = "stok-mapping"
cwd = "/home/zj/workspace/stok-mapping"
model = "gpt-5.4"
sandbox = "workspace-write"
approval_policy = "never"

rules = [
  "AGENTS.md",
  "CLAUDE.md",
  "README.md",
  "docs/DEVELOPMENT_PLAN.md",
  "docs/STRATEGY_DEVELOPMENT_GUIDELINES.md",
  "docs/CODEX_MCP_MULTI_AGENT_WORKFLOW.md"
]

verify_doc = [
  "rg -n \"Codex MCP|Agents SDK|Harness\" docs README.md AGENTS.md"
]

verify_code = [
  "./.venv/bin/python -m pytest"
]

memory_targets = [
  "docs",
  "reports"
]

[agent_models.team_lead]
kind = "default"
model = "gpt-5.5"
reasoning_effort = "high"
verbosity = "low"

[agent_models.planner]
kind = "default"
model = "gpt-5.5"
reasoning_effort = "high"
verbosity = "low"

[agent_models.implementer]
kind = "default"
model = "gpt-5.4"
reasoning_effort = "medium"
verbosity = "low"

[agent_models.context_curator]
kind = "openai_chat"
base_url_env = "DEEPSEEK_BASE_URL"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-v4-flash"

[agent_models.verifier]
kind = "openai_chat"
base_url_env = "DEEPSEEK_BASE_URL"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-v4-pro"
reasoning_effort = "high"
extra_body = { thinking = { type = "enabled" } }

[agent_models.memory_steward]
kind = "openai_chat"
base_url_env = "DEEPSEEK_BASE_URL"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-v4-flash"
